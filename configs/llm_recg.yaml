data_root: ./data
source: amazon_movies_and_tv
targets:
  - amazon_cds_and_vinyl

# Non-source domains used only for item-side semantic generalization.
# Their interactions are never used for training.
aux_domains:
  - amazon_cds_and_vinyl
  - amazon_industrial_and_scientific

paths:
  checkpoint_dir: artifacts/checkpoints/llm_recg
  result_dir: results/mainline/amt2acv/llm_recg

data:
  seed: 2026
  max_len: 50
  min_len: 3
  ranking: sampled
  eval_negatives: 100
  train_negatives: 5
  num_workers: 0
  embedding_dir: semantic_embeddings

model:
  # Official yunzhel2/LLM-RecG defaults use hidden_units=256 and dropout_rate=0.5.
  hidden_dim: 256
  num_layers: 2
  num_heads: 2
  dropout: 0.5

  # official_linear reproduces the module form in bert4rec_recg.py.
  # residual is the safer default for post-training source-pattern transfer.
  pattern_fusion: residual          # residual | official_linear | linear | none
  pattern_residual_weight: 0.5
  init_pattern_fusion_as_residual: true

training:
  device: auto
  batch_size: 128
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0
  early_stop_metric: NDCG@10
  early_stop_patience: 5
  eval_every: 1
  grad_clip: 5.0

  # true: project protocol, checkpoint selected by AMT source validation only.
  # false: closer to official repository, checkpoint selected by train loss.
  use_source_val_selection: true

llm_recg:
  # L_total = L_rec + L_gen
  # L_gen = - alpha * H_intra + beta * H_inter
  # beta = alpha * (N / |D|^3)
  alpha: 0.001

  # Official loss_func.py uses softmax(similarity * temperature), default=1.0.
  alignment_temperature: 1.0

  # Official-style fixed auxiliary pool sampled before training.
  aux_samples_per_domain: 4096

  # Sequence-level generalization.
  num_sequential_patterns: 10
  pattern_kmeans_batch_size: 4096
  pattern_max_users: 0
  pattern_use_minibatch: false
  use_patterns_in_target: true
