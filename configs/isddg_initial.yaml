data_root: ./data
source: amazon_movies_and_tv
targets:
  - amazon_cds_and_vinyl
  - amazon_industrial_and_scientific

paths:
  role_dir: artifacts/roles
  prototype_dir: artifacts/prototypes
  checkpoint_dir: artifacts/checkpoints
  result_dir: results

data:
  max_len: 50
  min_len: 3
  eval_negatives: 100
  train_negatives: 5
  ranking: sampled
  seed: 2026

model:
  backbone: bert4rec
  embedding_dim: null
  hidden_dim: 128
  num_layers: 2
  num_heads: 2
  dropout: 0.2
  role_dim: 4
  role_alpha: 0.2
  eta: 0.2
  lambda_dyn: 0.1

roles:
  K: 4
  long_gamma: 0.9
  recent_quantile: 0.3
  gmm_seed: 2026

prototypes:
  M: 128
  top_m: 16
  temperature: 0.2

training:
  batch_size: 128
  epochs: 20
  lr: 0.0001
  weight_decay: 0.0
  lambda_role: 0.1
  lambda_trans: 0.05
  device: auto
