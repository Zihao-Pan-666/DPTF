data_root: ./data
source: amazon_movies_and_tv

paths:
  role_dir: artifacts/roles/roles_v2/multiscale
  result_dir: results/dynamic_role

data:
  seed: 2026

roles:
  K: 4
  n_bins: 30
  recent_quantile: 0.2
  very_recent_quantile: 0.1
