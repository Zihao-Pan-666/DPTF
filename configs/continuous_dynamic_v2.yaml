data_root: ./data
source: amazon_movies_and_tv
targets:
  - amazon_cds_and_vinyl

paths:
  role_dir: artifacts/roles
  dynamic_dir: artifacts/dynamics
  checkpoint_dir: artifacts/checkpoints
  result_dir: results/continuous_dynamic_role

data:
  seed: 2026
  max_len: 50
  min_len: 3
  ranking: sampled
  eval_negatives: 100
  train_negatives: 5
  num_workers: 0

training:
  device: auto
  batch_size: 128

model:
  hidden_dim: 128
  num_layers: 2
  num_heads: 2
  dropout: 0.2

semantic:
  # Keep this aligned with the best source-selected semantic checkpoint.
  checkpoint: artifacts/checkpoints/semantic_amazon_movies_and_tv_seed2026.pt

continuous_dynamic_v2:
  source_observations_path: artifacts/roles/source_role_observations.parquet
  role_table_path: artifacts/roles/source_role_table.pt
  source_table_path: artifacts/dynamics/source_continuous_dynamic_table.pt
  stats_path: artifacts/dynamics/continuous_dynamic_stats.json
  checkpoint: artifacts/checkpoints/continuous_dynamic_prior_v2_amazon_movies_and_tv_seed2026.pt

  feature_cols:
    - level
    - trend
    - abs_trend
    - trend_mid
    - accel
    - volatility
    - support_log

  # Regression weights: emphasize trend-like dimensions, downweight support.
  feature_weights: [1.0, 2.0, 2.0, 1.5, 1.5, 1.0, 0.5]

  standardize: true
  hidden_dim: 256
  latent_dim: 128
  dropout: 0.1
  use_layer_norm: true
  l2_normalize_input: false

  epochs: 80
  lr: 0.0003
  weight_decay: 0.00001
  batch_size: 4096
  sequence_batch_size: 512
  val_ratio: 0.1
  patience: 10

  regression_loss_type: smooth_l1
  smooth_l1_beta: 1.0

  use_role_auxiliary: true
  lambda_reg: 1.0
  lambda_role: 0.2
  lambda_bpr: 0.1

  bpr_negatives: 20
  bpr_pooling: decay
  bpr_recent_k: 5
  bpr_decay: 0.8

  # Uses source validation only. No target interactions are used.
  source_val_ranking: true
  # Options: loss, val_mse, dynamic_ndcg, dynamic_composite.
  # dynamic_composite = source_val_NDCG@10 + recall_weight * source_val_Recall@10
  selection_mode: dynamic_composite
  recall_weight: 0.25

late_fusion:
  beta_grid: [0.0, 0.02, 0.05, 0.08, 0.1, 0.15, 0.2, 0.3, 0.5]
  select_metric: NDCG@10
  pooling: decay
  recent_k: 5
  decay: 0.8
  score_norm: zscore
