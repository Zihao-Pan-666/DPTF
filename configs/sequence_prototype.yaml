data_root: ./data
source: amazon_movies_and_tv
targets:
  - amazon_cds_and_vinyl

paths:
  result_dir: results/mainline/amt2acv/sequence_prototype
  prototype_bank: artifacts/prototypes/sequence_dynamic_amazon_movies_and_tv_M128_seed2026.pt
  prototype_summary: results/mainline/amt2acv/sequence_dynamic_prototype_build_summary.json

data:
  seed: 2026
  max_len: 50
  min_len: 3
  ranking: sampled
  eval_negatives: 100
  train_negatives: 5
  num_workers: 0
  embedding_dir: semantic_embeddings

training:
  device: auto
  batch_size: 128

model:
  hidden_dim: 128
  num_layers: 2
  num_heads: 2
  dropout: 0.2

semantic:
  checkpoint: artifacts/checkpoints/semantic_final/semantic_amazon_movies_and_tv_seed2026.pt

continuous_dynamic:
  checkpoint: artifacts/checkpoints/continuous_dynamic/semantic_conditioned_prior_enhanced_amazon_movies_and_tv_seed2026.pt

prototype:
  # Source prototype construction. Prototypes are built only from source train prefixes.
  M: 128
  build_batch_size: 1024
  kmeans_batch_size: 8192
  bank_path: artifacts/prototypes/sequence_dynamic_amazon_movies_and_tv_M128_seed2026.pt
  source_dynamic_table: artifacts/dynamics/amazon_movies_and_tv_continuous/source_continuous_dynamic_table.pt
  source_role_table: artifacts/roles/amazon_movies_and_tv_k4_default/source_role_table.pt

  # Source-val and zero-shot retrieval/fusion.
  top_m: 16
  temperature: 0.05
  candidate_dynamic_source: predicted  # predicted | oracle(source-val only) | table | none
  semantic_score_norm: zscore
  prototype_score_norm: zscore
  dynamic_score_norm: zscore

  # Use source validation only to select these weights.
  beta_sem_grid: [0.0, 0.02, 0.05, 0.08, 0.1, 0.15, 0.2]
  beta_dyn_grid: [0.0, 0.02, 0.05, 0.08, 0.1, 0.15, 0.2]
  select_metric: NDCG@10
  selection_summary: results/mainline/amt2acv/sequence_prototype_amazon_movies_and_tv_seed2026_summary.json
  default_beta_sem: 0.0
  default_beta_dyn: 0.0
