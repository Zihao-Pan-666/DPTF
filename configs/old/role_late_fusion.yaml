data_root: ./data
source: amazon_movies_and_tv
targets: [amazon_cds_and_vinyl]

paths:
  checkpoint_dir: artifacts/checkpoints
  result_dir: results/dynamic_role
  role_dir: artifacts/roles
  prototype_dir: artifacts/prototypes

data:
  max_len: 50
  min_len: 3
  eval_negatives: 100
  ranking: sampled
  seed: 2026
  num_workers: 0

model:
  hidden_dim: 128
  num_layers: 2
  num_heads: 2
  dropout: 0.2

late_fusion:
  semantic_checkpoint: artifacts/checkpoints/semantic_v0_amazon_movies_and_tv_seed2026.pt
  role_prior_checkpoint: artifacts/checkpoints/role_prior_amazon_movies_and_tv_seed2026.pt
  beta_grid: [0.0, 0.01, 0.03, 0.05, 0.1, 0.2, 0.5, 1.0]
  default_beta: 0.0
  pooling: decay
  recent_k: 10
  decay: 0.8
  role_score_norm: zscore
  early_stop_metric: NDCG@10

training:
  batch_size: 128
  device: auto
